<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Vida - Panel de Control</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --text-main: #e6edf3;
            --text-dim: #848d97;
            --accent: #7c3aed;
            --danger: #f85149;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { font-size: 24px; margin: 0; }
        p { color: var(--text-dim); margin: 5px 0 0 0; }

        .btn-update {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-update:hover { opacity: 0.8; }

        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #30363d;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #1c2128;
            padding: 15px;
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #30363d;
            vertical-align: middle;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-info img { 
            width: 45px; height: 45px; 
            border-radius: 8px; object-fit: cover; 
            border: 1px solid #30363d;
        }

        .blood-badge {
            background: rgba(248, 81, 73, 0.1);
            color: #ff7b72;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        .status-tag { color: var(--text-dim); font-size: 13px; }
        
        .action-delete {
            color: var(--danger);
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
        }

        .id-text { color: #58a6ff; font-size: 12px; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>Control de Donantes</h1>
            <p>Gestión de registros in-situ en tiempo real</p>
        </div>
        <button class="btn-update" onclick="actualizar()">↻ Actualizar Tabla</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID / FECHA</th>
                    <th>DONANTE</th>
                    <th>TIPO SANGUÍNEO</th>
                    <th>UBICACIÓN</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="lista-donadores">
                </tbody>
        </table>
    </div>

    <script>
        async function actualizar() {
            try {
                const res = await fetch('/api/donadores');
                const datos = await res.json();
                const contenedor = document.getElementById('lista-donadores');
                
                contenedor.innerHTML = datos.map(d => `
                    <tr>
                        <td>
                            <span class="id-text">${d.id}</span>
                            <small style="color:var(--text-dim)">${d.fecha.split(',')[0]}</small>
                        </td>
                        <td>
                            <div class="user-info">
                                <img src="${d.foto}" alt="selfie">
                                <div>
                                    <strong>${d.nombre}</strong><br>
                                    <small class="status-tag">Registro App</small>
                                </div>
                            </div>
                        </td>
                        <td><span class="blood-badge">${d.tipo_sangre || d.tipo}</span></td>
                        <td><span class="status-tag">📍 Ver Mapa</span></td>
                        <td><a href="#" class="action-delete">Eliminar</a></td>
                    </tr>
                `).join('') || '<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--text-dim)">No hay registros detectados</td></tr>';
            } catch (e) {
                console.error("Error cargando datos:", e);
            }
        }

        // Auto-actualizar cada 10 segundos
        setInterval(actualizar, 10000);
        actualizar();
    </script>
</body>
</html>
