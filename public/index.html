<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Vida - Panel de Control</title>
    <style>
        :root {
            /* TEMA CLARO */
            --bg-color: #ffffff; 
            --card-bg: #f8f9fa; 
            --text-main: #000000; 
            --text-dim: #6c757d; 
            --accent: #B71C1C; 
            --danger: #dc3545; 
            --border-color: #dee2e6; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 { font-size: 28px; margin: 0; color: #000000; }
        p { color: #d32f2f; margin: 5px 0 0 0; font-weight: 500; }

        .btn-update {
            background: var(--accent); color: #000000; 
            border: 2px solid #000000; padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }
        .btn-update:hover { background: #000000; color: #ffffff; }

        /* --- NUEVOS ESTILOS DEL PANEL DE EMERGENCIA --- */
        .emergency-panel {
            background: #fff5f5;
            border: 2px solid #dc3545;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.15);
        }

        .emergency-form {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .emergency-input {
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
            flex: 1;
            min-width: 200px;
        }

        .btn-alert {
            background: #dc3545;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(220, 53, 69, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        .active-alert-box {
            display: none; /* Se oculta por defecto */
            text-align: center;
            background: #dc3545;
            color: white;
            padding: 20px;
            border-radius: 8px;
        }

        .counter-number {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
            line-height: 1;
        }

        .btn-cancel {
            background: white;
            color: #dc3545;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        /* ----------------------------------------------- */

        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #e9ecef; padding: 15px; font-size: 13px; border-bottom: 2px solid var(--border-color); }
        td { padding: 15px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-info img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border-color); }
        .blood-badge { background: rgba(220, 53, 69, 0.1); color: #d32f2f; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .status-tag { color: var(--text-dim); font-size: 13px; }
        .action-delete { color: var(--danger); text-decoration: none; font-size: 13px; font-weight: bold; cursor: pointer; }
        .id-text { color: #0056b3; font-size: 12px; display: block; font-weight: 500;}
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>Control de Donantes</h1>
            <p>Gestión de registros en tiempo real</p>
        </div>
        <button class="btn-update" onclick="actualizarTodo()">↻ Actualizar Datos</button>
    </div>

    <div class="emergency-panel">
        <div id="form-crear-alerta" class="emergency-form">
            <h3 style="margin:0; color:#dc3545;">🚨 Centro de Alertas</h3>
            <select id="input-sangre" class="emergency-input" style="flex: 0.5;">
                <option value="Cualquiera">Cualquier tipo de sangre</option>
                <option value="O+">O Positivo (O+)</option>
                <option value="O-">O Negativo (O-)</option>
                <option value="A+">A Positivo (A+)</option>
                <option value="A-">A Negativo (A-)</option>
                <option value="B+">B Positivo (B+)</option>
                <option value="B-">B Negativo (B-)</option>
                <option value="AB+">AB Positivo (AB+)</option>
                <option value="AB-">AB Negativo (AB-)</option>
            </select>
            <input type="text" id="input-hospital" class="emergency-input" placeholder="Ej. Hospital Regional Universitario" value="Hospital Regional Universitario">
            <button class="btn-alert" onclick="emitirAlerta()">EMITIR ALERTA PUSH</button>
        </div>

        <div id="box-alerta-activa" class="active-alert-box">
            <h2 style="margin:0;">🚨 EMERGENCIA ACTIVA: Se requiere sangre <span id="sangre-requerida"></span></h2>
            <p style="color:white; opacity:0.9; margin:5px 0 0 0;">Hospital: <span id="hospital-destino"></span></p>
            <div class="counter-number" id="donadores-camino">0</div>
            <p style="color:white; margin:0 0 15px 0; font-weight:bold;">DONADORES EN CAMINO</p>
            <button class="btn-cancel" onclick="cancelarAlerta()">Finalizar Emergencia</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID / FECHA</th>
                    <th>DONANTE</th>
                    <th>TIPO SANGUÍNEO</th>
                    <th>UBICACIÓN</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="lista-donadores">
                <tr><td colspan="5" style="text-align:center; padding:40px; color:var(--text-dim)">Cargando registros...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // --- LÓGICA DE EMERGENCIAS ---
        async function revisarEmergencia() {
            try {
                const res = await fetch('/api/emergencias');
                
                // Si la ruta no existe todavía o hay error, no hacemos nada para que no se caiga la página
                if (!res.ok) return; 
                
                const datos = await res.json();
                
                const formAlerta = document.getElementById('form-crear-alerta');
                const boxAlerta = document.getElementById('box-alerta-activa');

                if (datos && datos.activa) {
                    // Hay emergencia
                    formAlerta.style.display = 'none';
                    boxAlerta.style.display = 'block';
                    document.getElementById('sangre-requerida').innerText = datos.tipo_sangre;
                    document.getElementById('hospital-destino').innerText = datos.hospital;
                    document.getElementById('donadores-camino').innerText = datos.donadores_en_camino;
                } else {
                    // No hay emergencia
                    formAlerta.style.display = 'flex';
                    boxAlerta.style.display = 'none';
                }
            } catch (e) {
                console.error("Error revisando emergencias:", e);
            }
        }

        async function emitirAlerta() {
            const sangre = document.getElementById('input-sangre').value;
            const hospital = document.getElementById('input-hospital').value;

            if (!confirm(`¿Estás seguro de emitir una alerta a todos los celulares pidiendo sangre ${sangre} para el ${hospital}?`)) return;

            try {
                const res = await fetch('/api/emergencias', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo_sangre: sangre, hospital: hospital })
                });

                if (res.ok) {
                    revisarEmergencia();
                } else {
                    alert("Error al intentar crear la alerta.");
                }
            } catch (e) {
                console.error("Error al emitir alerta:", e);
            }
        }

        async function cancelarAlerta() {
            if (!confirm("¿Deseas finalizar esta emergencia? El contador volverá a cero.")) return;

            try {
                await fetch('/api/emergencias', { method: 'DELETE' });
                revisarEmergencia();
            } catch (e) {
                console.error("Error al cancelar alerta:", e);
            }
        }

        // --- LÓGICA DE LA TABLA (IGUAL QUE ANTES) ---
        async function actualizarTabla() {
            try {
                const res = await fetch('/api/donadores');
                const datos = await res.json();
                const contenedor = document.getElementById('lista-donadores');
                
                if (datos.length === 0) {
                    contenedor.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--text-dim)">No hay registros detectados</td></tr>';
                    return;
                }

                contenedor.innerHTML = datos.map(d => `
                    <tr>
                        <td>
                            <span class="id-text">${d.id}</span>
                            <small style="color:var(--text-dim)">${d.fecha ? d.fecha.split(',')[0] : 'Hoy'}</small>
                        </td>
                        <td>
                            <div class="user-info">
                                <img src="${d.foto}" alt="selfie">
                                <div>
                                    <strong>${d.nombre}</strong><br>
                                    <small style="color:var(--text-dim)">📞 ${d.telefono || 'Sin teléfono'} | 🪪 ${d.curp || 'Sin CURP'}</small><br>
                                    <small class="status-tag">🏠 ${d.domicilio || 'Sin domicilio registrado'}</small>
                                </div>
                            </div>
                        </td>
                        <td><span class="blood-badge">${d.tipo_sangre || d.tipo || 'N/A'}</span></td>
                        <td>
                            <a href="https://www.google.com/maps?q=$${d.lat},${d.lng}" 
                               target="_blank" 
                               rel="noopener noreferrer"
                               style="background-color: #1f6feb; color: white; padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; transition: 0.2s;">
                               📍 Ver Mapa
                            </a>
                        </td>
                        <td>
                            <a href="javascript:void(0)" onclick="borrarDonador('${d.id}')" class="action-delete">Eliminar</a>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error("Error cargando datos:", e);
            }
        }

        async function borrarDonador(id) {
            if (!confirm("¿Seguro que quieres eliminar este registro?")) return;
            try {
                await fetch(`/api/donadores?id=${id}`, { method: 'DELETE' });
                actualizarTabla();
            } catch (e) {
                alert("No se pudo conectar con el servidor para eliminar.");
            }
        }

        // Función maestra que actualiza tanto la tabla como el panel de emergencia
        function actualizarTodo() {
            actualizarTabla();
            revisarEmergencia();
        }

        // Auto-actualizar cada 10 segundos (para ver en tiempo real si alguien va en camino)
        setInterval(actualizarTodo, 10000);
        
        // Carga inicial
        actualizarTodo();
    </script>
</body>
</html>
